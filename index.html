<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Download</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #F2F2F7 0%, #E8E8ED 100%);
        }

        .glow {
            position: absolute;
            inset: -20%;
            z-index: 0;
            background:
                radial-gradient(circle at 20% 25%, #8FD3FF 0%, transparent 42%),
                radial-gradient(circle at 80% 20%, #C9B6FF 0%, transparent 42%),
                radial-gradient(circle at 75% 80%, #FFB3C6 0%, transparent 42%),
                radial-gradient(circle at 20% 80%, #B7F0C4 0%, transparent 42%);
            filter: blur(70px) saturate(160%);
            opacity: 0.85;
            animation: hueShift 16s ease-in-out infinite, drift 22s ease-in-out infinite;
        }

        @keyframes hueShift {
            0% { filter: blur(70px) saturate(160%) hue-rotate(0deg); }
            50% { filter: blur(70px) saturate(180%) hue-rotate(140deg); }
            100% { filter: blur(70px) saturate(160%) hue-rotate(360deg); }
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(4%, -3%) scale(1.08); }
            66% { transform: translate(-3%, 4%) scale(1.05); }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 340px;
            padding: 36px 32px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 26px;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.85);
            text-align: center;
            animation: show 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes show {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: none; }
        }

        .icon {
            width: 78px;
            height: 78px;
            margin: 0 auto 20px;
            border-radius: 19px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
            background: linear-gradient(160deg, #FF6B57 0%, #D24726 100%);
            box-shadow: 0 10px 24px rgba(210, 71, 38, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        h1 {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #1C1C1E;
            margin-bottom: 26px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 14px;
            border-radius: 15px;
            background: linear-gradient(180deg, #0A84FF 0%, #0066D6 100%);
            color: white;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            transition: transform 0.15s ease, filter 0.15s ease;
            box-shadow: 0 8px 20px rgba(10, 132, 255, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
        }

        .btn:active {
            transform: scale(0.98);
            filter: brightness(0.96);
        }
    </style>
</head>

<body>

    <div class="glow"></div>

    <div class="card">
        <div class="icon">
            <i class="fa-solid fa-file-powerpoint"></i>
        </div>

        <h1>PPTX File </h1>

        <a href=".pptx" download class="btn">
            <i class="fa-solid fa-arrow-down"></i>
            Download
        </a>
    </div>

</body>

</html>
