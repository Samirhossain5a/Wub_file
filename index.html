<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Presentation Download</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

            background:
                radial-gradient(circle at 10% 20%, #7FC8FF 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, #A48CFF 0%, transparent 35%),
                linear-gradient(180deg, #F5F5F7, #ECECEC);

        }

        .blur {

            position: absolute;

            width: 450px;
            height: 450px;

            border-radius: 50%;

            background: #007AFF22;

            filter: blur(100px);

            top: -150px;
            left: -120px;

            animation: float 12s ease-in-out infinite;

        }

        .blur2 {

            position: absolute;

            width: 380px;
            height: 380px;

            border-radius: 50%;

            background: #8E8EFF33;

            filter: blur(100px);

            right: -120px;
            bottom: -120px;

            animation: float2 14s ease-in-out infinite;

        }

        @keyframes float {

            50% {

                transform: translate(50px, 40px);

            }

        }

        @keyframes float2 {

            50% {

                transform: translate(-40px, -30px);

            }

        }

        .card {

            position: relative;

            width: 430px;

            padding: 45px;

            background: rgba(255, 255, 255, .72);

            backdrop-filter: blur(30px);

            -webkit-backdrop-filter: blur(30px);

            border: 1px solid rgba(255, 255, 255, .8);

            border-radius: 35px;

            box-shadow:

                0 20px 60px rgba(0, 0, 0, .12),

                inset 0 1px 0 rgba(255, 255, 255, .9);

            text-align: center;

            animation: show .7s ease;

        }

        @keyframes show {

            from {

                opacity: 0;

                transform: translateY(25px) scale(.95);

            }

            to {

                opacity: 1;

                transform: none;

            }

        }

        .icon {

            width: 95px;

            height: 95px;

            margin: auto;

            border-radius: 28px;

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 42px;

            color: white;

            background: linear-gradient(135deg, #007AFF, #38BDF8);

            box-shadow: 0 15px 35px rgba(0, 122, 255, .35);

            margin-bottom: 25px;

        }

        h1 {

            font-size: 33px;

            font-weight: 800;

            color: #111827;

            margin-bottom: 12px;

        }

        .subtitle {

            font-size: 16px;

            color: #6B7280;

            line-height: 1.7;

            margin-bottom: 35px;

        }

        .file {

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 16px 20px;

            background: white;

            border-radius: 18px;

            margin-bottom: 30px;

            box-shadow: 0 8px 25px rgba(0, 0, 0, .05);

        }

        .file i {

            color: #D24726;

            font-size: 28px;

        }

        .file span {

            flex: 1;

            text-align: left;

            margin-left: 15px;

            font-weight: 600;

            color: #333;

        }

        .btn {

            display: flex;

            justify-content: center;

            align-items: center;

            gap: 10px;

            padding: 16px;

            border-radius: 18px;

            background: #007AFF;

            color: white;

            font-weight: 600;

            text-decoration: none;

            transition: .3s;

            box-shadow: 0 15px 30px rgba(0, 122, 255, .35);

        }

        .btn:hover {

            transform: translateY(-4px);

            background: #0062E6;

        }

        .footer {

            margin-top: 22px;

            font-size: 13px;

            color: #8A8A8A;

        }
    </style>

</head>

<body>

    <div class="blur"></div>
    <div class="blur2"></div>

    <div class="card">

        <div class="icon">
            <i class="fa-solid fa-file-powerpoint"></i>
        </div>

        <h1>Presentation</h1>

        <p class="subtitle">
            All Today Files..............
        </p>

        <div class="file">

            <i class="fa-solid fa-file-powerpoint"></i>

            <span>File.pptx</span>

        </div>

        <a href="Role of Physics in CSE final.pptx" download class="btn">

            <i class="fa-solid fa-download"></i>

            Download

        </a>

        <div class="footer">
            haaaaaaaaaaaaaaaaaaaaaaaaaaa
        </div>

    </div>

</body>

</html>
